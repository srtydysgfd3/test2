name: Electron Windows Stats (Unique & Sorted)

on:
  workflow_dispatch:

jobs:
  gather-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Unique Stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const https = require('https');

          const getPage = (page) => new Promise((resolve) => {
            const url = \`https://api.github.com/repos/electron/electron/releases?per_page=100&page=${page}\`;
            https.get(url, {
              headers: {
                'User-Agent': 'node',
                'Authorization': \`token \${process.env.GH_TOKEN}\`
              }
            }, (res) => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => resolve(JSON.parse(data)));
            });
          });

          (async () => {
            const windows = ['win32-x64', 'win32-ia32', 'win32-arm64'];
            const cutoffDate = new Date('2025-09-01');
            let versionMap = new Map(); // Use a Map to handle duplicates
            let page = 1;
            let keepGoing = true;

            console.log('Fetching data...');

            while (keepGoing && page <= 5) {
              const releases = await getPage(page);
              if (!releases || !Array.isArray(releases) || releases.length === 0) break;

              for (const r of releases) {
                const releaseDate = new Date(r.published_at);
                const isStable = !r.tag_name.includes('nightly') && !r.tag_name.includes('beta') && !r.tag_name.includes('alpha');

                if (releaseDate >= cutoffDate) {
                  if (isStable) {
                    const downloads = r.assets
                      .filter(a => windows.some(w => a.name.includes(w)))
                      .reduce((sum, a) => sum + a.download_count, 0);
                    
                    // If we haven't seen this version, or this one has more downloads, save it
                    if (!versionMap.has(r.tag_name) || downloads > versionMap.get(r.tag_name).downloads) {
                        versionMap.set(r.tag_name, { version: r.tag_name, date: r.published_at.split('T')[0], downloads });
                    }
                  }
                } else {
                  keepGoing = false;
                  break;
                }
              }
              page++;
            }

            // Convert Map back to array and sort
            const sortedStats = Array.from(versionMap.values())
              .sort((a, b) => b.downloads - a.downloads)
              .slice(0, 20);

            console.log('--- TOP 20 UNIQUE STABLE RELEASES ---');
            console.table(sortedStats);
          })();
          "
